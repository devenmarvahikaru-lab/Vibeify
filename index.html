<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibeify - Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: white; margin: 0; overflow: hidden; }
        .app-wrapper { display: flex; flex-direction: column; height: 100dvh; width: 100%; max-width: 100%; margin: 0; background: #030303; position: relative; }
        .page { flex: 1; display: none; overflow-y: auto; padding-bottom: 200px; scrollbar-width: none; }
        .page.active { display: block; }
        .page::-webkit-scrollbar { display: none; }
        .glass-player { background: rgba(33, 33, 33, 0.98); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.05); }
        .chip-active { background: white !important; color: black !important; font-weight: bold; }
        .panggilan-cepat { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .grid-item { position: relative; aspect-ratio: 1/1; border-radius: 8px; overflow: hidden; background: #1a1a1a; cursor: pointer; }
        .grid-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); font-size: 13px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <header class="p-5 flex justify-between items-center bg-black/80 sticky top-0 z-10 shrink-0">
            <h1 id="headerTitle" class="text-2xl font-bold">Beranda</h1>
            <div class="flex gap-5 text-xl text-zinc-300">
                <i class="fas fa-history"></i>
                <i class="fas fa-user-circle" onclick="initGoogleAuth()"></i>
            </div>
        </header>

        <div id="homePage" class="page active px-6">
            <div class="flex gap-2 mb-6 overflow-x-auto py-2">
                <button onclick="changeMood('Bersantai', this)" class="bg-[#212121] px-4 py-1.5 rounded-lg text-xs chip-active">Bersantai</button>
                <button onclick="changeMood('Senang', this)" class="bg-[#212121] px-4 py-1.5 rounded-lg text-xs">Senang</button>
                <button onclick="changeMood('Fokus', this)" class="bg-[#212121] px-4 py-1.5 rounded-lg text-xs">Fokus</button>
            </div>
            <h2 class="text-xl font-bold mb-4">Panggilan cepat</h2>
            <div id="quickGrid" class="panggilan-cepat mb-10"></div>
            <h2 class="text-xl font-bold mb-4">Pilihan cepat</h2>
            <div id="quickList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <div id="explorePage" class="page px-6">
            <div class="relative mt-4">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500"></i>
                <input type="text" id="searchInput" placeholder="Cari lagu..." class="w-full bg-[#121212] border border-zinc-800 rounded-2xl py-4 pl-12 pr-4 outline-none focus:border-zinc-500 transition">
            </div>
            <div id="searchResults" class="mt-8 space-y-4"></div>
        </div>

        <div id="libraryPage" class="page px-6">
            <h2 class="text-xl font-bold mb-6">Koleksi Musik</h2>
            <div id="userPlaylists" class="space-y-4"></div>
        </div>

        <div id="settingsPage" class="page px-6">
            <h2 class="text-xl font-bold mb-6">Pengaturan</h2>
            <div class="p-4 bg-[#121212] rounded-xl flex justify-between items-center" onclick="initGoogleAuth()">
                <div><h4 class="font-bold">Sinkronisasi YouTube</h4><p class="text-xs text-zinc-500">Hubungkan akun Anda</p></div>
                <i class="fab fa-youtube text-red-600 text-2xl"></i>
            </div>
        </div>

        <div id="miniPlayer" class="fixed bottom-[90px] left-4 right-4 glass-player p-3 rounded-2xl flex items-center justify-between z-40 hidden">
            <div class="flex items-center gap-3 flex-1 overflow-hidden" onclick="openFullPlayer()">
                <img id="miniArt" src="" class="w-12 h-12 rounded-lg object-cover">
                <div class="flex flex-col overflow-hidden">
                    <span id="miniTitle" class="font-bold text-sm truncate">...</span>
                    <span id="miniArtist" class="text-[11px] text-zinc-400 truncate">Artis</span>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div onclick="togglePlay()" class="w-10 h-10 border-2 border-white rounded-full flex items-center justify-center">
                    <i id="miniPlayBtn" class="fas fa-play text-xs ml-0.5"></i>
                </div>
            </div>
            <div id="miniProgressContainer" class="absolute bottom-0 left-0 right-0 h-1 bg-zinc-800 rounded-b-2xl overflow-hidden">
                <div id="miniProgressLine" class="h-full bg-white transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>

        <nav class="absolute bottom-0 left-0 right-0 h-20 bg-[#0f0f0f] border-t border-zinc-900 flex justify-around items-center z-50">
            <div onclick="switchPage('homePage', 'Beranda', this)" class="nav-btn flex flex-col items-center gap-1 text-white cursor-pointer"><i class="fas fa-home text-xl"></i><span class="text-[10px]">Beranda</span></div>
            <div onclick="switchPage('explorePage', 'Explore', this)" class="nav-btn flex flex-col items-center gap-1 text-zinc-500 cursor-pointer"><i class="fas fa-compass text-xl"></i><span class="text-[10px]">Explore</span></div>
            <div onclick="switchPage('libraryPage', 'Library', this)" class="nav-btn flex flex-col items-center gap-1 text-zinc-500 cursor-pointer"><i class="fas fa-layer-group text-xl"></i><span class="text-[10px]">Library</span></div>
            <div onclick="switchPage('settingsPage', 'Settings', this)" class="nav-btn flex flex-col items-center gap-1 text-zinc-500 cursor-pointer"><i class="fas fa-cog text-xl"></i><span class="text-[10px]">Settings</span></div>
        </nav>

        <div id="yt-player" class="hidden"></div>
    </div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="script.js"></script>
</body>
</html>
